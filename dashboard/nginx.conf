server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend services on the docker network.
    location /api/ {
        proxy_pass http://api-service:3002/;
    }
    location /ai/ {
        proxy_pass http://ai-search-service:3003/;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
